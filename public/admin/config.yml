backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "creations"
    label: "Créations"
    folder: "src/content/creations"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Flyer", value: "flyer" }
          - { label: "Brochure", value: "brochure" }
          - { label: "Affiche", value: "affiche" }
          - { label: "Packaging", value: "packaging" }
          - { label: "Identité visuelle", value: "identite" }
          - { label: "Logo", value: "logo" }
          - { label: "Web / Digital", value: "web" }
          - { label: "Autre", value: "autre" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Likes", name: "likes", widget: "number", default: 0 }

  - name: "events"
    label: "Événements"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Affiche", name: "affiche", widget: "image" }
